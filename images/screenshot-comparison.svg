<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <!-- Badge -->
  <rect x="490" y="30" width="220" height="28" rx="14" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="600" y="50" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="sans-serif" font-weight="bold" letter-spacing="2">COMPARISON</text>
  <!-- Title -->
  <text x="600" y="100" text-anchor="middle" font-size="36" fill="#f1f5f9" font-family="sans-serif" font-weight="800">생태계 종합 비교</text>
  <!-- Table header -->
  <rect x="60" y="140" width="1080" height="40" rx="8" fill="rgba(124,58,237,0.15)"/>
  <text x="120" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">항목</text>
  <text x="280" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">OpenClaw</text>
  <text x="440" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">NanoClaw</text>
  <text x="600" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">PicoClaw</text>
  <text x="760" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">ZeroClaw</text>
  <text x="940" y="166" font-size="13" fill="#a78bfa" font-family="sans-serif" font-weight="700">Hermes</text>
  <!-- Rows -->
  <line x1="60" y1="180" x2="1140" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="120" y="210" font-size="12" fill="#f1f5f9" font-family="sans-serif" font-weight="600">언어</text>
  <text x="280" y="210" font-size="11" fill="#06b6d4" font-family="sans-serif">TS/Swift</text>
  <text x="440" y="210" font-size="11" fill="#06b6d4" font-family="sans-serif">Node.js</text>
  <text x="600" y="210" font-size="11" fill="#10b981" font-family="sans-serif">Go</text>
  <text x="760" y="210" font-size="11" fill="#f97316" font-family="sans-serif">Rust</text>
  <text x="940" y="210" font-size="11" fill="#f59e0b" font-family="sans-serif">Python</text>
  <line x1="60" y1="225" x2="1140" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="120" y="255" font-size="12" fill="#f1f5f9" font-family="sans-serif" font-weight="600">RAM</text>
  <text x="280" y="255" font-size="11" fill="#94a3b8" font-family="sans-serif">>1 GB</text>
  <text x="440" y="255" font-size="11" fill="#94a3b8" font-family="sans-serif">중간</text>
  <text x="600" y="255" font-size="11" fill="#94a3b8" font-family="sans-serif">&lt;10 MB</text>
  <text x="760" y="255" font-size="11" fill="#94a3b8" font-family="sans-serif">&lt;5 MB</text>
  <text x="940" y="255" font-size="11" fill="#94a3b8" font-family="sans-serif">중간</text>
  <line x1="60" y1="270" x2="1140" y2="270" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="120" y="300" font-size="12" fill="#f1f5f9" font-family="sans-serif" font-weight="600">채널</text>
  <text x="280" y="300" font-size="11" fill="#94a3b8" font-family="sans-serif">25+</text>
  <text x="440" y="300" font-size="11" fill="#94a3b8" font-family="sans-serif">5+</text>
  <text x="600" y="300" font-size="11" fill="#94a3b8" font-family="sans-serif">18+</text>
  <text x="760" y="300" font-size="11" fill="#94a3b8" font-family="sans-serif">2+</text>
  <text x="940" y="300" font-size="11" fill="#94a3b8" font-family="sans-serif">6+</text>
  <line x1="60" y1="315" x2="1140" y2="315" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <text x="120" y="345" font-size="12" fill="#f1f5f9" font-family="sans-serif" font-weight="600">핵심</text>
  <text x="280" y="345" font-size="11" fill="#7c3aed" font-family="sans-serif">생태계 폭</text>
  <text x="440" y="345" font-size="11" fill="#06b6d4" font-family="sans-serif">컨테이너 격리</text>
  <text x="600" y="345" font-size="11" fill="#10b981" font-family="sans-serif">엣지 하드웨어</text>
  <text x="760" y="345" font-size="11" fill="#f97316" font-family="sans-serif">최소 바이너리</text>
  <text x="940" y="345" font-size="11" fill="#f59e0b" font-family="sans-serif">자기 학습</text>
  <!-- Bottom accent -->
  <rect x="0" y="672" width="1200" height="3" fill="url(#accent2)" opacity="0.6"/>
</svg>