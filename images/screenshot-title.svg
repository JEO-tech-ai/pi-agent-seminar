<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%">
      <stop offset="0%" style="stop-color:rgba(124,58,237,0.15)"/>
      <stop offset="50%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <!-- Grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(124,58,237,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Claw emoji placeholder -->
  <text x="600" y="220" text-anchor="middle" font-size="80" fill="#a78bfa" opacity="0.9">🦞</text>
  <!-- Badge -->
  <rect x="490" y="260" width="220" height="28" rx="14" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="600" y="280" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="sans-serif" font-weight="bold" letter-spacing="2">2026 TECHNICAL SEMINAR</text>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-size="52" fill="#f1f5f9" font-family="sans-serif" font-weight="800">PI Agent 생태계</text>
  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" font-size="18" fill="#94a3b8" font-family="sans-serif">OpenClaw, NanoClaw, PicoClaw, ZeroClaw, Hermes Agent</text>
  <text x="600" y="418" text-anchor="middle" font-size="16" fill="#64748b" font-family="sans-serif">차세대 개인 AI 에이전트 프레임워크의 모든 것</text>
  <!-- Bottom accent line -->
  <rect x="0" y="672" width="1200" height="3" fill="url(#accent)" opacity="0.6"/>
  <!-- TTS indicator -->
  <rect x="24" y="636" width="160" height="28" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="60" y="654" font-size="11" fill="#64748b" font-family="sans-serif">🔊 Gemini TTS</text>
  <!-- Slide counter -->
  <rect x="1080" y="636" width="96" height="28" rx="14" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="1128" y="654" text-anchor="middle" font-size="12" fill="#64748b" font-family="monospace">1 / 18</text>
</svg>